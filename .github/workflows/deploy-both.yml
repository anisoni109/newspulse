name: Deploy NewsPulse & Admin Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Build NewsPulse (main app)
      - name: Install dependencies
        run: npm ci

      - name: Build NewsPulse
        run: npm run build

      # Build Admin Dashboard
      - name: Install admin dashboard dependencies
        working-directory: admin-dashboard
        run: npm ci

      - name: Build Admin Dashboard
        working-directory: admin-dashboard
        run: npm run build

      # Merge both builds into one artifact (GitHub Pages only supports one)
      - name: Prepare deployment artifact
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          mkdir -p deploy/admin
          cp -r admin-dashboard/dist/* deploy/admin/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
