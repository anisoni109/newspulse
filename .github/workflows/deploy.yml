name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm install --frozen-lockfile

      - name: Install dependencies (Monitor Dashboard)
        working-directory: MonitorDashboard
        run: npm install --frozen-lockfile

      - name: Build NewsPulse and Monitor Dashboard
        run: |
          npm run build
          cd MonitorDashboard && npm run build && cd ..

      - name: Merge Monitor into dist/monitor
        run: |
          mkdir -p dist/monitor
          # Copy Monitor index.html to dist/monitor
          cp MonitorDashboard/dist/index.html dist/monitor/index-monitor.html
          # Copy Monitor assets
          cp -r MonitorDashboard/dist/assets/* dist/assets/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
